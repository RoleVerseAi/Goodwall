<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ new life ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #f0e9e0;
      padding: 16px;
    }
    #starCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 20, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 64px 64px 48px 48px;
      padding: 40px 32px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 215, 150, 0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,215,150,0.1);
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: #ffdbb5;
      text-shadow: 0 0 20px rgba(255,200,120,0.3);
      margin-bottom: 12px;
    }
    h1 span {
      font-weight: 600;
      background: linear-gradient(135deg, #ffb07c, #ffd58c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub {
      font-size: 1.1rem;
      opacity: 0.7;
      letter-spacing: 2px;
      margin-bottom: 28px;
      font-weight: 300;
    }
    .download-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 18px 0 24px;
    }
    .btn-download {
      background: rgba(255,215,150,0.08);
      border: 1.5px solid rgba(255,215,150,0.3);
      color: #f0e2d0;
      padding: 16px 40px;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(255,200,120,0.05);
      font-family: inherit;
    }
    .btn-download:hover {
      background: rgba(255,215,150,0.18);
      border-color: rgba(255,215,150,0.6);
      box-shadow: 0 0 30px rgba(255,200,120,0.15);
      transform: scale(1.02);
    }
    .btn-download:active { transform: scale(0.96); }
    .btn-download:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
    }
    .btn-download .icon { font-size: 1.8rem; line-height: 1; }
    .progress-wrap {
      width: 100%;
      max-width: 340px;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .progress-wrap.active { opacity: 1; }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffb07c, #ffd58c, #fce38a);
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,200,120,0.4);
      transition: width 0.15s linear;
    }
    .status {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 1px;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0.8;
    }
    .status .highlight { color: #ffd58c; font-weight: 500; }
    .hope-message {
      margin-top: 24px;
      padding: 18px 12px;
      border-radius: 40px;
      background: rgba(255,215,150,0.05);
      border: 1px solid rgba(255,215,150,0.08);
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      transition: all 0.9s cubic-bezier(0.23,1,0.32,1);
      pointer-events: none;
    }
    .hope-message.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .hope-message h2 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 3px;
      color: #ffe5c4;
      text-shadow: 0 0 30px rgba(255,200,120,0.2);
    }
    .hope-message h2 strong {
      font-weight: 600;
      background: linear-gradient(135deg, #ffb07c, #ffd58c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hope-message p {
      font-size: 1rem;
      opacity: 0.7;
      margin-top: 8px;
      letter-spacing: 1px;
      font-style: italic;
    }
    .sparkle-emoji {
      font-size: 2.6rem;
      display: inline-block;
      animation: floatGlow 2s infinite alternate;
    }
    @keyframes floatGlow {
      0% { transform: translateY(0) scale(1); text-shadow: 0 0 10px rgba(255,200,120,0.2); }
      100% { transform: translateY(-6px) scale(1.04); text-shadow: 0 0 30px rgba(255,200,120,0.6); }
    }
    @media (max-width: 480px) {
      .card { padding: 28px 18px 32px; }
      h1 { font-size: 2.2rem; }
      .btn-download { font-size: 1.2rem; padding: 14px 28px; }
      .hope-message h2 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <canvas id="starCanvas"></canvas>
  <div class="card">
    <h1>✦ <span>new life</span> ✦</h1>
    <div class="sub">a fresh start · a hopeful heart</div>
    <div class="download-area">
      <button class="btn-download" id="downloadBtn">
        <span class="icon">⬇️</span> start download
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status" id="statusText">✨ ready to begin</div>
    </div>
    <div class="hope-message" id="hopeMessage">
      <div class="sparkle-emoji">🌟</div>
      <h2>hope <strong>blooms</strong></h2>
      <p>“every day is a new beginning”</p>
      <div style="margin-top:10px; font-size:2.2rem; letter-spacing:8px;">✨🌱✨</div>
    </div>
  </div>
  <script>
    (function initStars() {
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');
      let width, height, stars = [];
      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        const count = Math.floor((width * height) / 2800);
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 1.6 + 0.4,
            brightness: Math.random() * 0.6 + 0.4,
            twinkleSpeed: 0.005 + Math.random() * 0.02,
            phase: Math.random() * Math.PI * 2
          });
        }
      }
      function drawStars(time) {
        ctx.clearRect(0, 0, width, height);
        const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height)*0.7);
        grad.addColorStop(0, '#14141e');
        grad.addColorStop(1, '#05050a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        for (let s of stars) {
          const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.phase);
          const alpha = s.brightness * (0.5 + 0.5 * twinkle);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 240, 220, ${alpha})`;
          ctx.fill();
          if (s.radius > 1.2) {
            ctx.shadowColor = 'rgba(255, 215, 150, 0.15)';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
        }
        requestAnimationFrame(drawStars);
      }
      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(drawStars);
    })();

    const downloadBtn = document.getElementById('downloadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const hopeMessage = document.getElementById('hopeMessage');

    let isDownloading = false, progress = 0, intervalId = null;
    const statusMessages = [
      '✨ connecting to hope...',
      '📡 receiving light...',
      '🌱 unpacking new beginnings...',
      '💫 almost there...',
      '🌟 ready!'
    ];

    function updateStatus(phase) {
      const idx = Math.min(phase, statusMessages.length - 1);
      statusText.innerHTML = statusMessages[idx];
    }

    function startDownload() {
      if (isDownloading) return;
      isDownloading = true;
      downloadBtn.disabled = true;
      downloadBtn.innerHTML = `<span class="icon">⏳</span> downloading...`;
      progressWrap.classList.add('active');
      progress = 0;
      progressBar.style.width = '0%';
      updateStatus(0);
      hopeMessage.classList.remove('show');

      let step = 0;
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(() => {
        step++;
        let increment;
        if (step < 20) increment = 0.6 + Math.random() * 0.8;
        else if (step < 50) increment = 0.8 + Math.random() * 1.0;
        else if (step < 70) increment = 0.5 + Math.random() * 0.8;
        else increment = 0.3 + Math.random() * 0.6;
        progress = Math.min(progress + increment, 100);
        progressBar.style.width = progress + '%';
        if (progress < 25) updateStatus(0);
        else if (progress < 50) updateStatus(1);
        else if (progress < 75) updateStatus(2);
        else if (progress < 95) updateStatus(3);
        else updateStatus(4);

        if (progress >= 100) {
          clearInterval(intervalId);
          intervalId = null;
          statusText.innerHTML = '🎉 <span class="highlight">download complete!</span>';
          downloadBtn.innerHTML = `<span class="icon">✅</span> done`;
          downloadBtn.disabled = false;
          isDownloading = false;
          setTimeout(() => {
            hopeMessage.classList.add('show');
            statusText.innerHTML = '🌟 <span class="highlight">new life starting...</span>';
            setTimeout(() => {
              downloadBtn.innerHTML = `<span class="icon">⬇️</span> download again`;
              downloadBtn.disabled = false;
            }, 600);
          }, 400);
        }
      }, 60);
    }

    downloadBtn.addEventListener('click', () => {
      if (!isDownloading && progress >= 100) {
        progress = 0;
        progressBar.style.width = '0%';
        progressWrap.classList.remove('active');
        hopeMessage.classList.remove('show');
        statusText.innerHTML = '✨ ready to begin';
        downloadBtn.innerHTML = `<span class="icon">⬇️</span> start download`;
        startDownload();
      } else {
        startDownload();
      }
    });
  </script>
</body>
</html>
