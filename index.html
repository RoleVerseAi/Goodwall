<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Clock 😘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
    }
    h1 {
      color: #8aafff;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
      margin-bottom: 30px;
      text-align: center;
    }
    .clock-wrap {
      background: #15152b;
      padding: 20px;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(0, 150, 255, 0.15), inset 0 0 30px rgba(0,0,0,0.6);
      border: 2px solid #2a2a50;
    }
    canvas {
      display: block;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: #1a1a30;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
    }
    @media (max-width: 400px) {
      canvas { width: 260px; height: 260px; }
      .clock-wrap { padding: 14px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <h1>My first clock coding 😘</h1>
  <div class="clock-wrap">
    <canvas id="clockCanvas" width="400" height="400"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('clockCanvas');
    const ctx = canvas.getContext('2d');
    const radius = 180;
    const centerX = 200;
    const centerY = 200;

    function drawClock() {
      const now = new Date();
      const hours = now.getHours() % 12;
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a30';
      ctx.fill();
      ctx.shadowColor = 'rgba(0, 200, 255, 0.1)';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius - 8, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();

      for (let i = 0; i < 60; i++) {
        const angle = (i * Math.PI) / 30 - Math.PI / 2;
        const isHour = i % 5 === 0;
        const length = isHour ? 16 : 8;
        const outer = radius - 12;
        const inner = radius - 12 - length;
        ctx.beginPath();
        ctx.moveTo(centerX + outer * Math.cos(angle), centerY + outer * Math.sin(angle));
        ctx.lineTo(centerX + inner * Math.cos(angle), centerY + inner * Math.sin(angle));
        ctx.strokeStyle = isHour ? '#b0c8ff' : '#556688';
        ctx.lineWidth = isHour ? 3 : 1.5;
        ctx.stroke();
      }

      ctx.fillStyle = '#c0d8ff';
      ctx.font = 'bold 22px "Segoe UI", "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 1; i <= 12; i++) {
        const angle = (i * Math.PI) / 6 - Math.PI / 2;
        const numRadius = radius - 36;
        const x = centerX + numRadius * Math.cos(angle);
        const y = centerY + numRadius * Math.sin(angle);
        ctx.fillText(i, x, y);
      }

      const hourAngle = (hours * Math.PI) / 6 + (minutes * Math.PI) / 360 - Math.PI / 2;
      const minuteAngle = (minutes * Math.PI) / 30 - Math.PI / 2;
      const secondAngle = (seconds * Math.PI) / 30 - Math.PI / 2;

      ctx.shadowColor = 'rgba(0, 200, 255, 0.2)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + 65 * Math.cos(hourAngle), centerY + 65 * Math.sin(hourAngle));
      ctx.strokeStyle = '#e0ecff';
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + 100 * Math.cos(minuteAngle), centerY + 100 * Math.sin(minuteAngle));
      ctx.strokeStyle = '#b0d0ff';
      ctx.lineWidth = 4.5;
      ctx.stroke();

      ctx.shadowBlur = 16;
      ctx.shadowColor = 'rgba(0, 200, 255, 0.3)';
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + 120 * Math.cos(secondAngle), centerY + 120 * Math.sin(secondAngle));
      ctx.strokeStyle = '#ff7777';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.shadowBlur = 20;
      ctx.shadowColor = 'rgba(0, 200, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#aaccff';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a30';
      ctx.fill();
    }

    drawClock();
    setInterval(drawClock, 1000);
  </script>
</body>
</html>
